# Terra EMS 短信服务配置示例
# 请根据实际情况修改配置值

terra:
  sms:
    # 短信服务提供商: aliyun (阿里云)
    provider: aliyun
    
    # 阿里云短信配置
    aliyun:
      # 阿里云访问密钥 ID（示例值，请替换为真实值）
      access-key-id: LTAI5tXXXXXXXXXXXXXX
      
      # 阿里云访问密钥 Secret（示例值，请替换为真实值）
      access-key-secret: YourAccessKeySecretHere
      
      # 短信服务访问端点（默认值，通常不需要修改）
      endpoint: dysmsapi.aliyuncs.com
      
      # 短信签名名称（需要在阿里云控制台创建并审核通过）
      # 示例: "泰若能源"
      sign-name: 泰若能源
      
      # 短信模板CODE（需要在阿里云控制台创建并审核通过）
      # 示例模板内容: "您的验证码是：${code}，有效期5分钟"
      template-code: SMS_123456789

---

# 开发环境配置（演示模式）
# 如果 aliyunSmsClient 未配置或初始化失败，会自动降级到控制台输出模式
spring:
  config:
    activate:
      on-profile: dev

terra:
  sms:
    provider: aliyun
    aliyun:
      # 开发环境可以使用空值，系统会自动降级到控制台输出
      access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:demo}
      access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:demo}
      sign-name: 开发测试签名
      template-code: SMS_DEV_000000

---

# 生产环境配置
# 必须配置真实的阿里云短信服务凭证
spring:
  config:
    activate:
      on-profile: prod

terra:
  sms:
    provider: aliyun
    aliyun:
      # 从环境变量读取，确保安全性
      access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID}
      access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET}
      sign-name: ${ALIYUN_SMS_SIGN_NAME}
      template-code: ${ALIYUN_SMS_TEMPLATE_CODE}
