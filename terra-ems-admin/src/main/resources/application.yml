spring:
  application:
    name: terra-ems
  
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/terra_ems?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: always
      data-locations: classpath:sql/init_dict.sql

  
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000
  
  session:
    store-type: redis
    redis:
      namespace: terra:ems:session

server:
  port: 8081
  servlet:
    context-path: /api

logging:
  level:
    com.terra.ems: debug
    org.springframework.security: debug
